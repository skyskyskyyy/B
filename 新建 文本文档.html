<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>生日祝福 · 专属小宇宙</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* 避免拖动/选中文字，保持干净点击 */
            -webkit-tap-highlight-color: transparent;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            touch-action: none;  /* 禁止滚动/缩放，移动端完美静止 */
            background: #b3e5fc; /* 备用底色，实际canvas背景覆盖 */
            font-family: 'Segoe UI', 'Quicksand', system-ui, -apple-system, 'Poppins', 'Helvetica Neue', sans-serif;
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            outline: none;
        }

        /* 提示小标签，优雅轻量 */
        .hint {
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            pointer-events: none;
            z-index: 20;
            font-size: 14px;
            color: rgba(255,255,240,0.7);
            text-shadow: 0 1px 2px rgba(0,0,0,0.2);
            background: rgba(0,0,0,0.2);
            backdrop-filter: blur(4px);
            display: inline-block;
            width: fit-content;
            margin: 0 auto;
            padding: 6px 18px;
            border-radius: 40px;
            font-weight: 500;
            letter-spacing: 1px;
        }
        .hint-wrapper {
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            pointer-events: none;
            z-index: 20;
        }
        @keyframes softPulse {
            0% { opacity: 0.5; transform: scale(1);}
            100% { opacity: 1; transform: scale(1.02);}
        }
    </style>
</head>
<body>
<div class="hint-wrapper"><div class="hint">✨ 轻触屏幕 · 生日祝福绽放 ✨</div></div>
<canvas id="birthdayCanvas"></canvas>

<script>
    (function(){
        // ---------- 闺蜜名字配置 (烟花粒子最终组成随机某个字) ----------
        const BESTIE_NAME = "雅婷";   // 举例: 闺蜜叫 "雅婷" , 第五次点击时会随机从 '雅','婷' 中选一字做烟花字
        // 若闺蜜名字三个字也可以，自动取每个字备选，但演示二字足够。确保汉字美观
        
        // ---------- 内置祝福语池 (30句+) ----------
        const GREETINGS_POOL = [
            "🎂 生日快乐，我的宝贝！", "💖 愿你每天都像今天一样甜", "✨ 星星为你而落，幸运向你奔赴",
            "🌸 新的一岁，光芒万丈", "💫 做永远快乐的小仙女", "🍰 愿世间美好与你环环相扣",
            "🎈 最好的闺蜜，生日超快乐", "💗 每一岁都能奔走在热爱里", "🎀 愿你被世界温柔以待",
            "🍬 甜度爆表的一天开始啦", "🌟 愿你所愿，终能实现", "🧸 要一直可可爱爱没烦恼",
            "🎉 今天你是宇宙中心", "💐 所有的彩带都为你炸开", "🕯️ 许个愿吧，一定会实现",
            "🌙 月光眷顾，星河偏爱", "🍭 永远十八岁，永远少女心", "💎 你是人间最闪亮的星",
            "🧚 愿你笑靥如花，一生无忧", "🍬 一口一口吃掉烦恼", "🎶 和快乐撞个满怀",
            "🎁 生日特权：无限宠爱", "❤️ 你是我这辈子最珍贵的宝藏", "🍃 岁月漫长，然而你值得",
            "⭐ 好运正在派送中", "💓 超多惊喜等着你", "🎠 像童话一样美好", 
            "🌸 春光明媚不如你", "🍀 所有幸运都眷顾你", "🥂 敬我们的友谊万岁"
        ];
        // 洗牌函数 (Fisher-Yates)
        function shuffleArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }
        let shuffledGreetings = [];
        let greetingIndex = 0;
        function getNextGreeting() {
            if (shuffledGreetings.length === 0 || greetingIndex >= shuffledGreetings.length) {
                shuffledGreetings = shuffleArray([...GREETINGS_POOL]);
                greetingIndex = 0;
            }
            const msg = shuffledGreetings[greetingIndex];
            greetingIndex++;
            return msg;
        }
        
        // ---------- 全局参数 ----------
        let canvas = document.getElementById('birthdayCanvas');
        let ctx = canvas.getContext('2d');
        let width, height;
        
        // 星星系统
        let stars = [];
        let starDensity = 15;      // 初始星星数量少，点击后会增加密度（动态增加）
        let baseStarCount = 18;
        let starFallSpeedBase = 0.35;
        
        // 彩带粒子系统
        let confettiParticles = [];
        
        // 浮动背景元素 (云、星、月、泡泡 低透明度漂浮物)
        let floatingBg = [];
        
        // 当前祝福语浮动特效
        let floatingMessages = [];
        
        // 点击计数器（只统计有效点击）
        let clickCount = 0;
        
        // 动画控制
        let animationId = null;
        let pageVisible = true;
        
        // 特殊烟花 (第5次触发放烟花 + 粒子组成汉字)
        let isFifthFireworkActive = false;
        let fireworkParticles = [];     // 火箭上升->爆炸粒子
        let charParticles = [];          // 汉字合成粒子（最终向目标点吸附）
        let isFormingChar = false;
        let charFormProgress = 0;        // 0~1 吸附过渡
        let targetPoints = [];            // {x, y} 汉字采样点（屏幕坐标）
        let formingCharActive = false;
        let charDisplayTimer = null;
        let blockClickDuringFirework = false;  // 烟花表演期间禁止额外点击 (0.8s左右锁)
        
        // 名字(闺蜜) 汉字集
        let nameChars = BESTIE_NAME.split('');
        let selectedChar = '';    // 第五次随机抽的字
        
        // 离屏canvas采样汉字点阵
        let offCanvas = document.createElement('canvas');
        let offCtx = offCanvas.getContext('2d');
        
        // --- 工具函数 更新画布尺寸 ---
        function resizeCanvas() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            // 重新初始化背景漂浮物 (按新尺寸)
            initFloatingBg();
            // 星星如果太少可以调整位置适配，不清空星星但重置位置会突兀，保留现有星星并重新映射范围? 简单重建星星
            // 为了体验，重置星星按照新密度生成
            regenerateStars();
        }
        
        function regenerateStars() {
            let targetCount = Math.min(120, baseStarCount + Math.floor(starDensity));
            stars = [];
            for(let i=0;i<targetCount;i++){
                stars.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    size: 2 + Math.random() * 4,
                    speedY: starFallSpeedBase + Math.random() * 0.6,
                    swing: Math.random() * Math.PI * 2,
                    swingAmp: 0.5 + Math.random() * 1.2,
                    alpha: 0.6 + Math.random() * 0.4
                });
            }
        }
        
        // 背景梦幻漂浮物 (云、月、星、泡泡)
        function initFloatingBg() {
            floatingBg = [];
            const count = 18;
            for(let i=0;i<count;i++){
                let type = Math.floor(Math.random() * 4); // 0云 1月 2星 3泡泡
                floatingBg.push({
                    type: type,
                    x: Math.random() * width,
                    y: Math.random() * height,
                    radius: 15 + Math.random() * 40,
                    speedX: (Math.random() - 0.5) * 0.2,
                    speedY: -0.1 - Math.random() * 0.2,
                    opacity: 0.08 + Math.random() * 0.12,
                    shapeOffset: Math.random() * Math.PI * 2
                });
            }
        }
        
        // 更新漂浮物位置
        function updateFloatingBg() {
            for(let obj of floatingBg){
                obj.x += obj.speedX;
                obj.y += obj.speedY;
                if(obj.y + obj.radius < 0) obj.y = height + obj.radius;
                if(obj.y > height + obj.radius) obj.y = -obj.radius;
                if(obj.x + obj.radius < 0) obj.x = width + obj.radius;
                if(obj.x > width + obj.radius) obj.x = -obj.radius;
            }
        }
        
        function drawFloatingBg() {
            for(let obj of floatingBg){
                ctx.save();
                ctx.globalAlpha = obj.opacity;
                ctx.beginPath();
                if(obj.type === 0){ // 云
                    ctx.ellipse(obj.x, obj.y, obj.radius*0.8, obj.radius*0.6, 0, 0, Math.PI*2);
                    ctx.ellipse(obj.x+obj.radius*0.5, obj.y-obj.radius*0.2, obj.radius*0.6, obj.radius*0.5, 0, 0, Math.PI*2);
                    ctx.ellipse(obj.x-obj.radius*0.5, obj.y-obj.radius*0.2, obj.radius*0.6, obj.radius*0.5, 0, 0, Math.PI*2);
                    ctx.fillStyle = "#ffffff";
                    ctx.fill();
                }else if(obj.type === 1){ // 弯月
                    ctx.arc(obj.x, obj.y, obj.radius*0.6, 0, Math.PI*2);
                    ctx.fillStyle = "#FFFDE7";
                    ctx.fill();
                    ctx.globalCompositeOperation = "destination-out";
                    ctx.arc(obj.x+obj.radius*0.25, obj.y-obj.radius*0.2, obj.radius*0.45, 0, Math.PI*2);
                    ctx.fill();
                    ctx.globalCompositeOperation = "source-over";
                }else if(obj.type === 2){ // 星型简笔
                    ctx.fillStyle = "#fff9c4";
                    for(let s=0;s<5;s++){
                        let angle = s * (Math.PI*2/5) + obj.shapeOffset;
                        let x1 = obj.x + Math.cos(angle)*obj.radius*0.5;
                        let y1 = obj.y + Math.sin(angle)*obj.radius*0.5;
                        ctx.beginPath();
                        ctx.arc(x1, y1, obj.radius*0.2, 0, Math.PI*2);
                        ctx.fill();
                    }
                }else{
                    ctx.beginPath();
                    ctx.arc(obj.x, obj.y, obj.radius*0.5, 0, Math.PI*2);
                    ctx.fillStyle = "#b2ebf2";
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(obj.x-2, obj.y-2, obj.radius*0.15, 0, Math.PI*2);
                    ctx.fillStyle = "#ffffff";
                    ctx.fill();
                }
                ctx.restore();
            }
        }
        
        // 星星逻辑
        function updateStars() {
            for(let s of stars){
                s.y += s.speedY;
                s.x += Math.sin(Date.now() * 0.002 + s.swing) * s.swingAmp * 0.08;
                if(s.y > height + 10){
                    s.y = -10;
                    s.x = Math.random() * width;
                }
                if(s.x < -10) s.x = width+10;
                if(s.x > width+10) s.x = -10;
            }
        }
        function drawStars() {
            for(let s of stars){
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.size*0.6, 0, Math.PI*2);
                ctx.fillStyle = `rgba(255, 250, 210, ${s.alpha * 0.9})`;
                ctx.fill();
                ctx.shadowBlur = 4;
                ctx.shadowColor = "#fffbd0";
                ctx.fill();
                ctx.shadowBlur = 0;
            }
        }
        
        // 彩带粒子
        function addConfettiExplosion(x,y){
            let count = 28 + Math.floor(Math.random() * 15);
            for(let i=0;i<count;i++){
                let angle = Math.random() * Math.PI * 2;
                let spd = 2 + Math.random() * 5;
                let vx = Math.cos(angle) * spd;
                let vy = Math.sin(angle) * spd;
                confettiParticles.push({
                    x: x, y: y, vx: vx, vy: vy, size: 3 + Math.random() * 6,
                    rot: Math.random() * Math.PI*2, rotSpeed: (Math.random()-0.5)*0.2,
                    life: 1.0, color: `hsl(${Math.random()*60 + 320}, 80%, 65%)`,
                    gravity: 0.2, drag: 0.98
                });
            }
        }
        function updateConfetti(){
            for(let i=0;i<confettiParticles.length;i++){
                let p = confettiParticles[i];
                p.vx *= p.drag;
                p.vy += p.gravity;
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.018;
                p.rot += p.rotSpeed;
                if(p.y > height+50 || p.x<-50 || p.x>width+50 || p.life<=0){
                    confettiParticles.splice(i,1);
                    i--;
                }
            }
        }
        function drawConfetti(){
            for(let p of confettiParticles){
                ctx.save();
                ctx.globalAlpha = p.life * 0.9;
                ctx.translate(p.x, p.y);
                ctx.rotate(p.rot);
                ctx.fillStyle = p.color;
                ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size*0.6);
                ctx.restore();
            }
        }
        
        // 祝福语浮层
        function addMessageBubble(text, clickX, clickY){
            let screenX = clickX;
            let screenY = clickY;
            // 边缘避开
            const margin = 60;
            if(screenX < margin) screenX = margin;
            if(screenX > width - margin) screenX = width - margin;
            if(screenY < 100) screenY = 100;
            floatingMessages.push({
                text: text,
                x: screenX,
                y: screenY,
                life: 1.0,
                vy: -1.2,
                alpha: 1
            });
        }
        function updateMessages(){
            for(let i=0;i<floatingMessages.length;i++){
                let m = floatingMessages[i];
                m.y += m.vy;
                m.vy -= 0.02;
                m.life -= 0.012;
                if(m.y < -50 || m.life<=0){
                    floatingMessages.splice(i,1);
                    i--;
                }
            }
        }
        function drawMessages(){
            for(let m of floatingMessages){
                ctx.save();
                ctx.font = `500 ${18+Math.sin(Date.now()*0.01)*1}px "Segoe UI", "Quicksand", system-ui`;
                ctx.shadowBlur = 6;
                ctx.shadowColor = "rgba(0,0,0,0.2)";
                ctx.fillStyle = `rgba(255, 245, 220, ${m.life*0.95})`;
                ctx.textAlign = "center";
                ctx.fillText(m.text, m.x, m.y);
                ctx.shadowBlur = 0;
                ctx.restore();
            }
        }
        
        // ----- 烟花粒子&汉字合成 (第五次高潮)-----
        // 采样目标汉字点阵 (离屏canvas)
        function sampleCharacterPoints(character, targetWidth, targetHeight, maxPoints=550) {
            const fontSize = Math.min(targetHeight * 0.55, 130);
            offCanvas.width = targetWidth;
            offCanvas.height = targetHeight;
            offCtx.fillStyle = "#000000";
            offCtx.fillRect(0,0,targetWidth,targetHeight);
            offCtx.font = `600 ${fontSize}px "PingFang SC", "Segoe UI", "Microsoft YaHei", "Poppins"`;
            offCtx.textAlign = "center";
            offCtx.textBaseline = "middle";
            offCtx.fillStyle = "white";
            offCtx.fillText(character, targetWidth/2, targetHeight/2);
            let imageData = offCtx.getImageData(0,0,targetWidth,targetHeight);
            let points = [];
            let step = 2;
            for(let y=0; y<targetHeight; y+=step){
                for(let x=0; x<targetWidth; x+=step){
                    let idx = (y*targetWidth + x)*4;
                    if(imageData.data[idx] > 200){
                        points.push({x: x, y: y});
                    }
                }
            }
            // 如果点太多随机降采样至maxPoints内
            if(points.length > maxPoints){
                let sampled = [];
                let stepIdx = Math.floor(points.length / maxPoints);
                for(let i=0;i<points.length;i+=stepIdx){
                    if(sampled.length<maxPoints) sampled.push(points[i]);
                }
                points = sampled;
            }
            return points;
        }
        
        // 启动烟花+汉字组合特效 (第5次)
        function launchFifthFirework(clickX,clickY){
            if(isFifthFireworkActive || blockClickDuringFirework) return;
            isFifthFireworkActive = true;
            blockClickDuringFirework = true;
            // 随机选闺蜜名字中的一个字
            let randomIndex = Math.floor(Math.random() * nameChars.length);
            selectedChar = nameChars[randomIndex];
            // 获取该汉字的采样目标点 (相对于画布中心区域 显示)
            let centerX = width/2;
            let centerY = height/2 - 40;
            let regionW = 180;
            let regionH = 180;
            targetPoints = sampleCharacterPoints(selectedChar, regionW, regionH, 520);
            // 转换目标点坐标到实际画布位置 (偏移至center区域)
            let realTargets = targetPoints.map(p => ({
                x: centerX - regionW/2 + p.x,
                y: centerY - regionH/2 + p.y
            }));
            targetPoints = realTargets;
            
            // 创建向上火箭特效 (简单粒子表现)
            let rocketX = clickX;
            let rocketY = clickY;
            let rocketParticles = [];
            for(let i=0;i<18;i++){
                rocketParticles.push({
                    x: rocketX + (Math.random()-0.5)*8,
                    y: rocketY + Math.random()*12,
                    vx: (Math.random()-0.5)*1.2,
                    vy: -4 - Math.random()*3,
                    life: 0.8,
                    color: `hsl(${30+Math.random()*40}, 90%, 65%)`,
                    size: 3
                });
            }
            // 创建爆炸预备粒子组 -> 之后转变为汉字合成粒子
            fireworkParticles = rocketParticles;
            // 让火箭尾迹短暂动画后爆炸 (250ms后触发爆炸, 并转化为汉字粒子吸附)
            setTimeout(()=>{
                // 爆炸生成大量彩带色彩粒子 + 汉字吸附粒子
                if(!pageVisible) return;
                // 生成粒子群 (最终用于组成汉字的粒子)
                let particleArray = [];
                let baseColorChoice = () => {
                    let r = Math.random();
                    if(r<0.6) return "#6ab0ff"; // 蓝
                    else if(r<0.85) return "#c06cff"; // 紫
                    else return "#ffb56b";
                };
                for(let i=0;i<targetPoints.length;i++){
                    // 起始位置在爆炸点周围随机偏移
                    let startX = clickX + (Math.random()-0.5)*90;
                    let startY = clickY + (Math.random()-0.5)*70 - 30;
                    particleArray.push({
                        x: startX,
                        y: startY,
                        targetX: targetPoints[i].x,
                        targetY: targetPoints[i].y,
                        progress: 0,  // 0~1 吸附进度
                        size: 2.5 + Math.random() * 3,
                        color: baseColorChoice(),
                        delayOffset: Math.random() * 0.3,
                        active: true
                    });
                }
                charParticles = particleArray;
                isFormingChar = true;
                formingCharActive = true;
                charFormProgress = 0;
                // 清除火箭粒子组
                fireworkParticles = [];
                // 额外添加周围绚烂彩带爆炸效果
                for(let s=0;s<80;s++){
                    let ang = Math.random()*2*Math.PI;
                    let sp = 2+Math.random()*6;
                    confettiParticles.push({
                        x: clickX, y: clickY, vx: Math.cos(ang)*sp, vy: Math.sin(ang)*sp,
                        size: 3+Math.random()*8, rot:0, rotSpeed:0.1, life:0.9,
                        color: `hsl(${Math.random()*360}, 80%, 65%)`, gravity:0.18, drag:0.97
                    });
                }
                // 字形显示后停留1.8秒淡出
                if(charDisplayTimer) clearTimeout(charDisplayTimer);
                charDisplayTimer = setTimeout(()=>{
                    formingCharActive = false;
                    isFormingChar = false;
                    charParticles = [];
                    isFifthFireworkActive = false;
                    // 解锁点击，但需要避免短时间狂点可能二次触发：延迟完整解锁
                    setTimeout(()=>{ blockClickDuringFirework = false; }, 200);
                }, 2000);
            }, 260);
            // 解锁全局烟花锁但保留blockClickDuringFirework，避免过程中点击; 在爆炸后最终解锁; 先延迟总表演时间
            setTimeout(()=>{
                if(!formingCharActive){
                    blockClickDuringFirework = false;
                    isFifthFireworkActive = false;
                }
            }, 1800);
        }
        
        // 更新汉字粒子吸附 (每一帧)
        function updateCharFormation(){
            if(!isFormingChar || !formingCharActive) return;
            let allDone = true;
            for(let p of charParticles){
                if(p.progress < 1){
                    allDone = false;
                    p.progress += 0.023;
                    if(p.progress>1) p.progress=1;
                }
            }
            if(allDone && charParticles.length>0){
                // 完全吸附完成，不再更新亦可
            }
        }
        function drawCharFormation(){
            if(!isFormingChar || !formingCharActive) return;
            for(let p of charParticles){
                let curX = p.x + (p.targetX - p.x) * p.progress;
                let curY = p.y + (p.targetY - p.y) * p.progress;
                ctx.beginPath();
                ctx.arc(curX, curY, p.size*0.9, 0, Math.PI*2);
                ctx.fillStyle = p.color;
                ctx.shadowBlur = 5;
                ctx.fill();
            }
            ctx.shadowBlur = 0;
        }
        
        function updateFirework(){
            if(fireworkParticles.length){
                for(let i=0;i<fireworkParticles.length;i++){
                    let p = fireworkParticles[i];
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vy += 0.12;
                    p.life -= 0.02;
                    if(p.y<-50 || p.life<=0){
                        fireworkParticles.splice(i,1);
                        i--;
                    }
                }
            }
        }
        function drawFirework(){
            for(let p of fireworkParticles){
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
                ctx.fill();
            }
        }
        
        // 主渲染循环
        function animate(){
            if(!pageVisible) return;
            // 渐变梦幻背景
            let grad = ctx.createLinearGradient(0, 0, 0, height);
            grad.addColorStop(0, "#c9e9ff");
            grad.addColorStop(1, "#b0d4ff");
            ctx.fillStyle = grad;
            ctx.fillRect(0,0,width,height);
            
            drawFloatingBg();
            updateFloatingBg();
            updateStars();
            drawStars();
            updateConfetti();
            drawConfetti();
            updateMessages();
            drawMessages();
            updateFirework();
            drawFirework();
            updateCharFormation();
            drawCharFormation();
            
            animationId = requestAnimationFrame(animate);
        }
        
        // 处理点击事件 (触发彩带+祝福, 并累计第5次高光)
        function handleTap(e){
            if(blockClickDuringFirework) return;
            e.preventDefault();
            let rect = canvas.getBoundingClientRect();
            let scaleX = canvas.width / rect.width;
            let scaleY = canvas.height / rect.height;
            let clientX, clientY;
            if(e.touches){
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            let canvasX = (clientX - rect.left) * scaleX;
            let canvasY = (clientY - rect.top) * scaleY;
            canvasX = Math.min(width, Math.max(0, canvasX));
            canvasY = Math.min(height, Math.max(0, canvasY));
            
            // 每次点击增加星星密度 (从第二次开始更多星星)
            starDensity += 1.8;
            if(starDensity > 50) starDensity = 50;
            regenerateStars();
            
            // 彩带爆炸
            addConfettiExplosion(canvasX, canvasY);
            let greeting = getNextGreeting();
            addMessageBubble(greeting, canvasX, canvasY);
            
            clickCount++;
            if(clickCount === 5){
                // 触发烟花&汉字组合高潮
                launchFifthFirework(canvasX, canvasY);
                clickCount = 0;  // 重置避免连续爆发，但可形成循环，每五次一次大型烟花表演
            }
        }
        
        // 页面可见性api
        function onVisibilityChange(){
            pageVisible = !document.hidden;
            if(pageVisible && !animationId){
                animate();
            }
        }
        document.addEventListener('visibilitychange', onVisibilityChange);
        
        // 监听事件
        canvas.addEventListener('touchstart', handleTap, {passive: false});
        canvas.addEventListener('mousedown', handleTap);
        
        window.addEventListener('resize', ()=>{
            resizeCanvas();
            regenerateStars();
            initFloatingBg();
        });
        
        // 初始化
        resizeCanvas();
        regenerateStars();
        initFloatingBg();
        // 初始祝福洗牌
        shuffledGreetings = shuffleArray([...GREETINGS_POOL]);
        greetingIndex = 0;
        animate();
    })();
</script>
</body>
</html>
